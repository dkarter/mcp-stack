default_provider = "onepass"

[providers]
onepass = { type = "1password", vault = "fnox" }
keychain = { type = "keychain", service = "fnox" }

[secrets]
OP_SERVICE_ACCOUNT_TOKEN = { provider = "keychain", value = "OP_SERVICE_ACCOUNT_TOKEN" }
CONTEXT7_API_KEY = { provider = "keychain", value = "CONTEXT7_API_KEY" }
E2B_API_KEY = { provider = "keychain", value = "E2B_API_KEY" }
GITHUB_PERSONAL_ACCESS_TOKEN = { provider = "keychain", value = "GITHUB_PERSONAL_ACCESS_TOKEN" }
MCP_GATEWAY_TOKEN_LINEAR= { provider = "keychain", value = "mcp-gateway/linear" }
