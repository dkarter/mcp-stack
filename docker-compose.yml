# ================================================
# MCP Stack - Unified Proxy (Streamable HTTP)
# ================================================

services:
  # Context7 MCP Server (HTTP)
  context7:
    # should check if I can get this to work 	mcp/context7
    image: mcp/context7:latest
    restart: unless-stopped
    ports:
      - '${CONTEXT7_EXT_PORT:-8047}:${INTERNAL_PORT:-8000}'
    environment:
      - PORT=${INTERNAL_PORT:-8000}
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY:-}
    read_only: true
    tmpfs:
      - /tmp:rw,size=256m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    healthcheck:
      test: ['CMD-SHELL', 'nc -z -v localhost ${CONTEXT7_HEALTH_PORT:-8000} >/dev/null 2>&1']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mcp_net

  # GitHub MCP Server (HTTP)
  github:
    image: ghcr.io/github/github-mcp-server:latest
    command: ['http', '--port', '${GITHUB_MCP_INTERNAL_PORT:-8082}']
    restart: unless-stopped
    ports:
      - '${GITHUB_MCP_EXT_PORT:-8048}:${GITHUB_MCP_INTERNAL_PORT:-8082}'
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    read_only: true
    tmpfs:
      - /tmp:rw,size=128m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    healthcheck:
      test: ['CMD', '/server/github-mcp-server', '--version']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mcp_net

  e2b:
    image: mcp/e2b:latest
    entrypoint: ['node', '/app/http-adapter.js']
    restart: unless-stopped
    ports:
      - '${E2B_MCP_EXT_PORT:-8050}:${E2B_MCP_INTERNAL_PORT:-8083}'
    environment:
      - PORT=${E2B_MCP_INTERNAL_PORT:-8083}
      - E2B_API_KEY=${E2B_API_KEY:-}
      - REQUEST_TIMEOUT_MS=30000
    volumes:
      - ./e2b/http-adapter.js:/app/http-adapter.js:ro
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:${E2B_MCP_INTERNAL_PORT:-8083}/health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mcp_net

  gateway:
    profiles: ['docker-gateway']
    build:
      context: ./gateway
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '${MCP_GATEWAY_EXT_PORT:-8049}:${MCP_GATEWAY_INTERNAL_PORT:-8090}'
    environment:
      - PORT=${MCP_GATEWAY_INTERNAL_PORT:-8090}
      - GATEWAY_DB_PATH=/data/gateway.db
      - SECRET_BACKEND=${SECRET_BACKEND:-fnox}
      - MCP_UPSTREAMS=context7=http://context7:${INTERNAL_PORT:-8000}/mcp,github=http://github:${GITHUB_MCP_INTERNAL_PORT:-8082}/mcp,e2b=http://e2b:${E2B_MCP_INTERNAL_PORT:-8083}/mcp
      - UPSTREAM_TIMEOUT=20
    read_only: true
    volumes:
      - gateway_data:/data
    tmpfs:
      - /tmp:rw,size=64m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:${MCP_GATEWAY_INTERNAL_PORT:-8090}/health']
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      context7:
        condition: service_healthy
      github:
        condition: service_healthy
      e2b:
        condition: service_healthy
    networks:
      - mcp_net

  # # SearXNG MCP Server (HTTP)
  # searxng:
  #   image: isokoliuk/mcp-searxng:latest
  #   restart: unless-stopped
  #   ports:
  #     - "${SEARXNG_EXT_PORT}:${INTERNAL_PORT}"
  #   environment:
  #     - SEARXNG_URL=${SEARXNG_URL}
  #     - TZ=Europe/Berlin
  #     - MCP_HTTP_PORT=${INTERNAL_PORT}
  #   read_only: true
  #   tmpfs:
  #     - /tmp:rw,size=128m,noexec
  #   cap_drop:
  #     - ALL
  #   security_opt:
  #     - no-new-privileges:true
  #   mem_limit: 512m
  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:${INTERNAL_PORT}/health"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - mcp_net
  #
  # Unified Proxy (Nginx)
  proxy:
    image: nginx:alpine
    ports:
      - '${BIND_ADDRESS:-127.0.0.1}:${GATEWAY_PORT:-8080}:${PROXY_INTERNAL_PORT:-8080}'
    environment:
      - GATEWAY_HOST=${GATEWAY_HOST:-host.docker.internal}
      - MCP_GATEWAY_INTERNAL_PORT=${MCP_GATEWAY_INTERNAL_PORT:-8090}
      - INTERNAL_PORT=${INTERNAL_PORT:-8000}
      - GITHUB_MCP_INTERNAL_PORT=${GITHUB_MCP_INTERNAL_PORT:-8082}
      - E2B_MCP_INTERNAL_PORT=${E2B_MCP_INTERNAL_PORT:-8083}
      - PROXY_INTERNAL_PORT=${PROXY_INTERNAL_PORT:-8080}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    depends_on:
      context7:
        condition: service_healthy
      github:
        condition: service_healthy
      e2b:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp_net

networks:
  mcp_net:
    driver: bridge

volumes:
  gateway_data:
