  #   healthcheck:
  #     test: ["CMD", "wget", "-qO-", "http://localhost:${INTERNAL_PORT}/health"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - mcp_net
  #
  # Unified Proxy (Nginx)
  proxy:
    image: nginx:alpine
    ports:
      - '${BIND_ADDRESS:-127.0.0.1}:${GATEWAY_PORT:-8080}:${PROXY_INTERNAL_PORT:-8080}'
    environment:
      - INTERNAL_PORT=${INTERNAL_PORT:-8000}
      - PROXY_INTERNAL_PORT=${PROXY_INTERNAL_PORT:-8080}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
    depends_on:
      context7:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp_net

networks:
  mcp_net:
    driver: bridge
