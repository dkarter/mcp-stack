# ================================================
# MCP Stack - Backend MCP Services
# ================================================

services:
  # Context7 MCP Server (HTTP)
  context7:
    # should check if I can get this to work 	mcp/context7
    image: mcp/context7:latest
    restart: unless-stopped
    ports:
      - '${CONTEXT7_EXT_PORT:-8047}:${INTERNAL_PORT:-8000}'
    environment:
      - PORT=${INTERNAL_PORT:-8000}
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY:-}
    read_only: true
    tmpfs:
      - /tmp:rw,size=256m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    healthcheck:
      test: ['CMD-SHELL', 'nc -z -v localhost ${CONTEXT7_HEALTH_PORT:-8000} >/dev/null 2>&1']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mcp_net

  # GitHub MCP Server (HTTP)
  github:
    image: ghcr.io/github/github-mcp-server:latest
    command: ['http', '--port', '${GITHUB_MCP_INTERNAL_PORT:-8082}']
    restart: unless-stopped
    ports:
      - '${GITHUB_MCP_EXT_PORT:-8048}:${GITHUB_MCP_INTERNAL_PORT:-8082}'
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN:-}
    read_only: true
    tmpfs:
      - /tmp:rw,size=128m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    healthcheck:
      test: ['CMD', '/server/github-mcp-server', '--version']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mcp_net

  e2b:
    image: mcp/e2b:latest
    entrypoint: ['node', '/app/http-adapter.js']
    restart: unless-stopped
    ports:
      - '${E2B_MCP_EXT_PORT:-8050}:${E2B_MCP_INTERNAL_PORT:-8083}'
    environment:
      - PORT=${E2B_MCP_INTERNAL_PORT:-8083}
      - E2B_API_KEY=${E2B_API_KEY:-}
      - REQUEST_TIMEOUT_MS=30000
    volumes:
      - ./e2b/http-adapter.js:/app/http-adapter.js:ro
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:${E2B_MCP_INTERNAL_PORT:-8083}/health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mcp_net

networks:
  mcp_net:
    driver: bridge
