[tools]
"github:crate-ci/committed" = "latest"
bun = "latest"
dprint = "latest"
fnox = "latest"
gitleaks = "latest"
lefthook = "latest"
pitchfork = "latest"
caddy = "latest"

[hooks]
postinstall = "lefthook install"

[tasks.fmt]
description = "Formats all supported files"
run = "dprint fmt"

[tasks.fmt-check]
description = "Checks formatting and fails on differences"
run = "dprint check"

[tasks.gateway-local]
description = "Runs gateway locally using fnox secrets"
run = "fnox exec --if-missing warn -- env SECRET_BACKEND='fnox' MCP_UPSTREAMS='context7=http://127.0.0.1:8047/mcp,github=http://127.0.0.1:8048/mcp,e2b=http://127.0.0.1:8050/mcp' GATEWAY_DB_PATH='./gateway/gateway.db' bun gateway/server.ts"

[tasks.stack-up]
description = "Starts stack daemons via pitchfork"
run = "pitchfork start --all"

[tasks.stack-down]
description = "Stops stack daemons via pitchfork"
run = "pitchfork stop --all"

[tasks.stack-status]
description = "Shows status of stack daemons"
run = "pitchfork list"

[tasks.caddy-trust-ca]
description = "Trusts local Caddy CA in macOS keychain"
run = "test -f ./.caddy/caddy/pki/authorities/local/root.crt || (echo 'Caddy CA not found. Run `mise run stack-up` and open https://localhost:8443 once.' && exit 1); security add-trusted-cert -d -r trustRoot -k ~/Library/Keychains/login.keychain-db ./.caddy/caddy/pki/authorities/local/root.crt; sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain ./.caddy/caddy/pki/authorities/local/root.crt"
